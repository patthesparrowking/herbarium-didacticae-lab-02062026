<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>Etikett erstellen | Herbarium Didacticae</title>

<link rel="stylesheet" href="../css/base.css" />
<link rel="stylesheet" href="../css/layout.css" />
<link rel="stylesheet" href="../css/navigation.css" />
<link rel="stylesheet" href="../css/forms.css" />


<link rel="manifest" href="../manifest.json">
<meta name="theme-color" content="#18331F">

  <script src="../js/app.js" defer></script>
  <script src="../js/navigation.js" defer></script>
</head>

<body>
  <div class="app-shell">

    <header class="app-header">
      <div>
        <p class="app-kicker">Neues Herbarium-Etikett</p>
        <h1>Etikett erstellen</h1>
      </div>
    </header>

    <main class="app-content">

      <form class="form-card" id="labelForm">

        <section class="form-section">
    <p class="section-label">Vorlage</p>

    <label class="form-field">
        <span>Etikett-Vorlage</span>
        <select name="templateId" id="labelTemplateSelect">
            <option value="classic">Klassisch</option>
            <option value="compact">Kompakt</option>
            <option value="didactic">Didaktisch</option>
        </select>
    </label>
</section>

        <section class="form-section">
          <p class="section-label">Pflanze</p>

          <label class="form-field">
            <span>Wissenschaftlicher Name</span>
            <input type="text" name="scientificName" placeholder="z. B. Galium odoratum" required>
          </label>

          <label class="form-field">
            <span>Deutscher Name</span>
            <input type="text" name="germanName" placeholder="z. B. Waldmeister">
          </label>

          <label class="form-field">
            <span>Familie</span>
            <input type="text" name="family" placeholder="z. B. Rubiaceae">
          </label>
        </section>

        <section class="form-section">
          <p class="section-label">Fundort</p>

<label class="form-field">
    <span>Fundortbeschreibung</span>
    <textarea
        name="location"
        rows="3"
        placeholder="z. B. in silva prope Bayreuth"
    ></textarea>
</label>

<button class="secondary-action" type="button" id="openDictionaryOverlay">
    Wörterbuch öffnen
</button>

<label class="form-field">
    <span>Lateinische Fundortangabe</span>
    <textarea
        name="latinLocation"
        rows="3"
        placeholder="z. B. in silva prope Bayreuth"
    ></textarea>
</label>

          <div class="form-grid-2">
            <label class="form-field">
              <span>Breitengrad</span>
              <input type="number" step="any" name="latitude" placeholder="49.945">
            </label>

            <label class="form-field">
              <span>Längengrad</span>
              <input type="number" step="any" name="longitude" placeholder="11.571">
            </label>
          </div>
        </section>

        <section class="form-section">
          <p class="section-label">Sammlung</p>

          <label class="form-field">
            <span>Sammler:in</span>
            <input type="text" name="collector" placeholder="Name">
          </label>

          <label class="form-field">
            <span>Sammeldatum</span>
            <input type="date" name="collectionDate">
          </label>

          <label class="form-field">
            <span>Notizen</span>
            <textarea name="notes" rows="3" placeholder="Weitere Beobachtungen"></textarea>
          </label>
        </section>

        <button class="primary-action" type="submit">
          Etikett speichern
        </button>

      </form>

      <section class="overlay" id="dictionaryOverlay" hidden>
    <div class="overlay-panel">

        <div class="overlay-header">
            <h2>Wörterbuch</h2>

            <button class="icon-button" type="button" id="closeDictionaryOverlay">
                ×
            </button>
        </div>

        <label class="form-field">
            <span>Begriff suchen</span>
            <input
                type="search"
                id="dictionaryOverlaySearch"
                placeholder="Deutsch oder Latein suchen..."
            >
        </label>

        <div id="dictionaryOverlayList"></div>

    </div>
</section>

    </main>

    <div id="bottomnav-root"></div>

  </div>
</body>
</html>
