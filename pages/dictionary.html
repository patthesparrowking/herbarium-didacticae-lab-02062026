<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <title>Wörterbuch | Herbarium Didacticae</title>

    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/navigation.css">
    <link rel="stylesheet" href="../css/forms.css">

    <script src="../js/app.js" defer></script>
    <script src="../js/navigation.js" defer></script>
</head>

<body>

<div class="app-shell">

    <header class="app-header">
        <div>
            <p class="app-kicker">Lateinische Begriffe</p>
            <h1>Wörterbuch</h1>
        </div>
    </header>

    <main class="app-content">

        <section class="card collection-filters">
            <label class="form-field">
                <span>Wörterbuch durchsuchen</span>
                <input
                    type="search"
                    id="dictionarySearch"
                    placeholder="Deutsch, Latein oder Kategorie suchen..."
                >
            </label>

            <label class="form-field">
                <span>Kategorie</span>
                <select id="dictionaryCategory">
                    <option value="">Alle Kategorien</option>
                </select>
            </label>

            <button class="secondary-action" type="button" id="resetDictionaryFilters">
                Suche zurücksetzen
            </button>
        </section>

        <section id="dictionaryList"></section>

    </main>

    <div id="bottomnav-root"></div>

</div>

</body>
</html>
