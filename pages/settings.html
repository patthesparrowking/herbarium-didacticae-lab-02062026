<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <title>Einstellungen | Herbarium Didacticae</title>

    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/navigation.css">
    <link rel="stylesheet" href="../css/forms.css">

    <script src="../js/app.js" defer></script>
    <script src="../js/navigation.js" defer></script>
</head>

<body>
<div class="app-shell">

    <header class="app-header">
        <div>
            <p class="app-kicker">Backup & Daten</p>
            <h1>Einstellungen</h1>
        </div>
    </header>

    <main class="app-content">

        <section class="card collection-filters">
            <p class="section-label">Datensicherung</p>

            <button class="primary-action" type="button" id="exportDataButton">
                Daten exportieren
            </button>

            <label class="form-field">
                <span>Daten importieren</span>
                <input type="file" id="importDataInput" accept="application/json">
            </label>
        </section>

    </main>

    <div id="bottomnav-root"></div>

</div>
</body>
</html>
